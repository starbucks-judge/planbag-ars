<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Pretendard',sans-serif;overflow:hidden;background:#0d1117;color:#fff}

/* 디스플레이 화면 */

}

.ds-qr-info{}

.ds-qr-url{font-size:16px;color:rgba(255,255,255,0.6);margin-bottom:12px}
.ds-qr-code{font-size:clamp(40px,6vw,80px);font-weight:900;letter-spacing:10px;color:var(--ds-accent, #e94560);line-height:1}
.ds-participant-badge{margin-top:20px;display:flex;align-items:center;gap:8px;font-size:20px;color:rgba(255,255,255,0.7)}
.ds-pulse{width:10px;height:10px;border-radius:50%;background:#4ade80;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.ds-count{font-size:28px;font-weight:800;color:#4ade80;margin:0 4px}

/* 문항 화면 */
#ds-question{
  background:var(--ds-bg, #0d1117);
  padding:40px 60px;
}
.ds-q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.ds-live-badge{display:flex;align-items:center;gap:8px;background:rgba(233,69,96,0.15);border:1px solid rgba(233,69,96,0.3);border-radius:20px;padding:8px 20px;font-size:16px;font-weight:700;color:var(--ds-accent,#e94560)}
.ds-live-dot{width:10px;height:10px;border-radius:50%;background:var(--ds-accent,#e94560);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.ds-q-count{font-size:18px;color:rgba(255,255,255,0.4)}
.ds-q-type{font-size:14px;font-weight:700;color:var(--ds-accent,#e94560);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.ds-q-text{font-size:clamp(28px,4vw,56px);font-weight:800;color:#fff;line-height:1.3;margin-bottom:32px}
.ds-progress-wrap{background:rgba(255,255,255,0.08);border-radius:8px;height:10px;overflow:hidden;margin-bottom:8px}
.ds-progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,var(--ds-accent,#e94560));border-radius:8px;transition:width .5s ease}
.ds-progress-label{display:flex;justify-content:space-between;font-size:15px;color:rgba(255,255,255,0.5);margin-bottom:28px}

/* MC 결과 */
.ds-mc-results{display:flex;flex-direction:column;gap:14px}
.ds-mc-item{display:flex;align-items:center;gap:16px;animation:slideIn .4s ease forwards;opacity:0}

.ds-ctrl:hover{opacity:1}
.ds-ctrl{opacity:.35}
.ds-ctrl-btn{padding:8px 16px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s;color:#fff}

.ds-ctrl-btn.green{background:#059669}.ds-ctrl-btn.green:hover{opacity:.85}
.ds-ctrl-divider{width:1px;background:rgba(255,255,255,0.15);margin:0 4px}
.ds-ticker{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.8);border-top:1px solid rgba(255,255,255,0.08);padding:10px 20px;display:flex;align-items:center;gap:14px;font-size:15px;z-index:100}
.ds-ticker-label{color:var(--ds-accent,#e94560);font-weight:700;white-space:nowrap}
.ds-ticker-track{overflow:hidden;flex:1}
.ds-ticker-content{display:flex;gap:60px;width:max-content}
.ds-ticker-item{color:rgba(255,255,255,0.6);white-space:nowrap}
.ticker-animate{animation:scroll 20s linear infinite}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* 로딩 */
#ds-loading{background:#0d1117;align-items:center;justify-content:center;flex-direction:column}
.loading-spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,0.1);border-top-color:#e94560;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 에러 */
#ds-error{background:#0d1117;align-items:center;justify-content:center;flex-direction:column;text-align:center}
</style>

<script>
// ============================================================
// STATE
// ============================================================
const ds = {
  session: null,
  settings: {},
  participantCount: 0,
  currentQuestion: null,
  questions: [],
  upflows: [],
  tickerItems: [],
  responseChannel: null
};

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  if (!code) { showError('URL에 참여 코드가 없습니다 (?code=XXXXXX)'); return; }
  await loadSession(code);
});

async function loadSession(code) {
  const { data: session, error } = await sb.from('ars_sessions')
    .select('*').eq('access_code', code).single();
  if (error || !session) { showError('행사를 찾을 수 없습니다: ' + code); return; }

  ds.session = session;
  ds.settings = session.display_settings || {};

  // 스타일 적용
  applySettings();

  // 참여자 수 로드
  await refreshParticipantCount();

  // 문항 로드
  await loadQuestions();

  // 실시간 구독
  subscribeRealtime(session.id);

  // 활성 문항 확인
  const activeQ = ds.questions.find(q => q.is_active);
  if (activeQ) showQuestion(activeQ);
  else showStandby();
}

function applySettings() {
  const s = ds.settings;
  const bg = s.bg_color || '#0d1117';
  const accent = s.accent_color || '#e94560';
  document.documentElement.style.setProperty('--ds-bg', bg);
  document.documentElement.style.setProperty('--ds-accent', accent);

  // 배경 이미지
  if (s.bg_image_url) {
    document.getElementById('ds-bg-img').style.backgroundImage = `url(${s.bg_image_url})`;
    document.getElementById('ds-bg-img').style.display = 'block';
  }

  // 로고
  const logo = document.getElementById('ds-logo');
  if (s.logo_url) { logo.src = s.logo_url; logo.style.display = 'block'; }

  // 티커
  if (s.show_ticker === false) {
    document.getElementById('ds-ticker').style.display = 'none';
  }
}

function showStandby() {
  showScreen('standby');
  const ev = ds.session;
  const s = ds.settings;

  if (s.show_event_name !== false) document.getElementById('ds-event-name').textContent = ev.event_name || '';
  else document.getElementById('ds-event-name').style.display = 'none';

  if (s.show_org_name !== false && ev.org_name) document.getElementById('ds-org-name').textContent = ev.org_name;
  else document.getElementById('ds-org-name').style.display = 'none';

  const code = ev.access_code;
  const url = `starbucks-judge.github.io/planbag-ars/audience.html`;

  if (s.show_qr !== false) {
    const fullUrl = `https://${url}?code=${code}`;
    document.getElementById('ds-qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=${encodeURIComponent(fullUrl)}`;
    document.getElementById('ds-qr-url').textContent = url;
    document.getElementById('ds-qr-code').textContent = code;
  } else {
    document.getElementById('ds-qr-section').style.display = 'none';
  }

  if (s.show_participant_count !== false) {
    updateParticipantDisplay();
  } else {
    document.getElementById('ds-participant-badge').style.display = 'none';
  }

  // 티커 설정
  setupTicker();
}

function updateParticipantDisplay() {
  document.getElementById('ds-count').textContent = ds.participantCount;
  document.getElementById('ds-q-participant').textContent = ds.participantCount;
}

async function refreshParticipantCount() {
  const { count } = await sb.from('ars_attendance')
    .select('*', { count: 'exact', head: true })
    .eq('session_id', ds.session.id);
  ds.participantCount = count || 0;
  updateParticipantDisplay();
}

// ============================================================
// REALTIME
// ============================================================
function subscribeRealtime(sessionId) {
  sb.channel('display-rt-' + sessionId)
    // 세션 설정 변경 (display_settings 업데이트 시 즉시 반영)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'ars_sessions', filter: `id=eq.${sessionId}` }, (payload) => {
      ds.session = payload.new;
      ds.settings = payload.new.display_settings || {};
      applySettings();
      // 대기화면이면 다시 렌더
      if (document.getElementById('ds-standby').classList.contains('active')) showStandby();
    })
    // 문항 상태 변경
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'ars_questions', filter: `session_id=eq.${sessionId}` }, async (payload) => {
      const q = payload.new;
      const idx = ds.questions.findIndex(x => x.id === q.id);
      if (idx >= 0) ds.questions[idx] = q;
      else ds.questions.push(q);

      if (q.is_active) {
        const idx = ds.questions.findIndex(x => x.id === q.id);
        dsCurrentQIdx = idx;
        updateCtrlLabel();
        showQuestion(q);
      } else if (q.is_closed && ds.currentQuestion?.id === q.id) {
        // 마감 → 결과 표시
        if (q.show_result) await showResults(q);
        else showStandby();
      } else if (!q.is_active && !q.is_closed) {
        // 모든 문항 비활성 → 대기화면
        const anyActive = ds.questions.some(x => x.is_active);
        if (!anyActive) showStandby();
      }
    })
    // 응답 INSERT → 응답률 업데이트
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'ars_responses', filter: `session_id=eq.${sessionId}` }, async () => {
      if (!ds.currentQuestion) return;
      await refreshResponseCount();
    })
    // 출석 INSERT → 참여자 수 업데이트
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'ars_attendance', filter: `session_id=eq.${sessionId}` }, async () => {
      await refreshParticipantCount();
      addTickerItem('✅ 새 참여자가 입장했습니다');
    })
    // UpFlow INSERT
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'ars_upflows', filter: `session_id=eq.${sessionId}` }, async (payload) => {
      addTickerItem('💬 새 질문: ' + payload.new.text.slice(0, 30) + (payload.new.text.length > 30 ? '...' : ''));
      await loadUpflows();
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'ars_upflows', filter: `session_id=eq.${sessionId}` }, async () => {
      await loadUpflows();
      // upflow 화면이 활성화 중이면 즉시 재렌더링
      if (document.getElementById('ds-upflow').classList.contains('active')) {
        renderUpflowScreen();
      }
    })
    .subscribe();
}

// ============================================================
// 문항 표시
// ============================================================
async function loadQuestions() {
  const { data } = await sb.from('ars_questions')
    .select('*').eq('session_id', ds.session.id).order('sort_order');
  ds.questions = data || [];
}

function showQuestion(q) {
  ds.currentQuestion = q;
  showScreen('question');
  const typeLabels = { mc: '객관식', open: '주관식', word: '워드클라우드' };
  const qIdx = ds.questions.findIndex(x => x.id === q.id);
  document.getElementById('ds-q-type').textContent = typeLabels[q.type] || '';
  document.getElementById('ds-q-text').textContent = q.text || '';
  document.getElementById('ds-q-count').textContent = qIdx >= 0 ? `문항 ${qIdx+1} / ${ds.questions.length}` : '';
  document.getElementById('ds-prog-fill').style.width = '0%';
  document.getElementById('ds-resp-count').textContent = '응답 0명';
  document.getElementById('ds-resp-pct').textContent = '0%';
  document.getElementById('ds-content').innerHTML = '';

  if (q.show_result) {
    // 실시간 결과 구독
    refreshResponseCount();
  }
}

async function refreshResponseCount() {
  if (!ds.currentQuestion) return;
  const { data: resps } = await sb.from('ars_responses')
    .select('*').eq('question_id', ds.currentQuestion.id);
  const count = (resps || []).length;
  // 응답률은 참여자수 기준이 아닌 최대 응답자 기준으로 표시 (100% 초과 방지)
  const total = Math.max(ds.participantCount, count, 1);
  const pct = Math.min(Math.round(count / total * 100), 100);
  document.getElementById('ds-prog-fill').style.width = pct + '%';
  document.getElementById('ds-resp-count').textContent = `응답 ${count}명`;
  document.getElementById('ds-resp-pct').textContent = pct + '%';

  if (ds.currentQuestion.type === 'mc') renderMCBars(ds.currentQuestion, resps || []);
  else if (ds.currentQuestion.type === 'word') renderWordCloud(resps || []);
  else if (ds.currentQuestion.type === 'open') renderOpenBubbles(resps || []);
}

async function showResults(q) {
  const { data: resps } = await sb.from('ars_responses').select('*').eq('question_id', q.id);
  showQuestion(q);
  if (q.type === 'mc') renderMCBars(q, resps || []);
  else if (q.type === 'word') renderWordCloud(resps || []);
  else renderOpenBubbles(resps || []);
}

function renderMCBars(q, resps) {
  const opts = q.options || [];
  const counts = new Array(opts.length).fill(0);
  resps.forEach(r => { if (r.answer_index !== null && r.answer_index < counts.length) counts[r.answer_index]++; });
  const total = counts.reduce((a,b)=>a+b,0) || 1;
  const maxC = Math.max(...counts);
  const letters = ['A','B','C','D','E','F'];
  document.getElementById('ds-content').innerHTML = `<div class="ds-mc-results">` +
    opts.map((opt,i) => {
      const pct = Math.round(counts[i]/total*100);
      const isWinner = counts[i] === maxC && maxC > 0;
      return `<div class="ds-mc-item" style="animation-delay:${i*0.08}s">
        <div class="ds-mc-letter ${isWinner?'winner':''}">${letters[i]}</div>
        <div class="ds-mc-bar-wrap">
          <div class="ds-mc-bar-label">
            <span class="ds-mc-bar-text">${opt}</span>
            <span class="ds-mc-bar-pct ${isWinner?'winner-pct':''}">${pct}%</span>
          </div>
          <div class="ds-mc-bar-bg"><div class="ds-mc-bar-fg ${isWinner?'winner-bar':'normal'}" style="width:0%" data-w="${pct}"></div></div>
          <div class="ds-mc-count">${counts[i]}명</div>
        </div>
      </div>`;
    }).join('') + `</div>`;
  setTimeout(() => document.querySelectorAll('.ds-mc-bar-fg').forEach(el => el.style.width = el.dataset.w+'%'), 100);
}

function renderWordCloud(resps) {
  const wordMap = {};
  resps.forEach(r => { if(r.answer){ const w=r.answer.trim(); wordMap[w]=(wordMap[w]||0)+1; } });
  const sorted = Object.entries(wordMap).sort((a,b)=>b[1]-a[1]).slice(0,20);
  const maxC = sorted[0]?.[1] || 1;
  const colors = ['#e94560','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899'];
  document.getElementById('ds-content').innerHTML = `<div class="ds-wc-wrap">` +
    sorted.map(([w,c],i) => `<span class="ds-wc-word" style="font-size:${20+Math.round(c/maxC*48)}px;color:${colors[i%colors.length]}">${w}</span>`).join('') +
    `</div>`;
}

function renderOpenBubbles(resps) {
  document.getElementById('ds-content').innerHTML = `<div class="ds-open-grid">` +
    resps.slice(0,8).map((r,i) => `<div class="ds-open-bubble" style="animation-delay:${i*0.12}s">${r.answer||''}</div>`).join('') +
    `</div>`;
}

// ============================================================
// UPFLOW
// ============================================================
async function loadUpflows() {
  const { data } = await sb.from('ars_upflows')
    .select('*').eq('session_id', ds.session.id)
    .order('vote_count', { ascending: false });
  ds.upflows = data || [];
  if (document.getElementById('ds-upflow').classList.contains('active')) renderUpflowScreen();
}

function renderUpflowScreen() {
  const highlighted = ds.upflows.filter(u => u.is_highlighted);

  if (highlighted.length > 0) {
    const u = highlighted[0];
    document.getElementById('ds-upflow-list').innerHTML = `
      <div class="ds-upflow-item top" style="border:2px solid var(--ds-accent,#e94560);padding:40px 48px">
        <div class="ds-upflow-votes" style="font-size:clamp(40px,6vw,72px)">${u.vote_count}</div>
        <div class="ds-upflow-text" style="font-size:clamp(24px,3.5vw,44px);font-weight:700">${u.text}</div>
      </div>`;
    // 청중질문 화면이 아니면 자동 전환
    if (!document.getElementById('ds-upflow').classList.contains('active')) {
      showScreen('upflow');
    }
  } else {
    // highlight 없으면 빈 화면
    document.getElementById('ds-upflow-list').innerHTML = `
      <div style="text-align:center;padding:60px;color:rgba(255,255,255,0.2);font-size:20px">
        관리자가 질문을 선택하면 여기에 표시됩니다
      </div>`;
    // 청중질문 화면이 표시 중이었으면 대기화면으로
    if (document.getElementById('ds-upflow').classList.contains('active')) {
      showStandby();
    }
  }
}

// ============================================================
// 티커
// ============================================================
function setupTicker() {
  const s = ds.settings;
  const base = s.ticker_message ? [s.ticker_message] : [];
  ds.tickerItems = [
    ...base,
    `${ds.session.event_name} — ${ds.session.access_code}`,
    'QR코드를 스캔하여 참여해주세요',
    `현재 ${ds.participantCount}명 참여 중`
  ];
  renderTicker();
}

function addTickerItem(msg) {
  ds.tickerItems.push(msg);
  if (ds.tickerItems.length > 10) ds.tickerItems.shift();
  renderTicker();
}

function renderTicker() {
  const items = [...ds.tickerItems, ...ds.tickerItems];
  document.getElementById('ds-ticker-content').innerHTML =
    items.map(t => `<span class="ds-ticker-item">• ${t}</span>`).join('');
}

// ============================================================
// 수동 컨트롤 (관리자용 버튼)
// ============================================================
let dsCurrentQIdx = -1;

function dsGoStandby() { showStandby(); }

async function dsShowUpflow() {
  await loadUpflows();
  renderUpflowScreen();
  showScreen('upflow');
}

function dsPrevQ() {
  if (!ds.questions.length) return;
  dsCurrentQIdx = Math.max(0, dsCurrentQIdx - 1);
  const q = ds.questions[dsCurrentQIdx];
  if (q) { showQuestion(q); updateCtrlLabel(); }
}

function dsNextQ() {
  if (!ds.questions.length) return;
  dsCurrentQIdx = Math.min(ds.questions.length - 1, dsCurrentQIdx + 1);
  const q = ds.questions[dsCurrentQIdx];
  if (q) { showQuestion(q); updateCtrlLabel(); }
}

function updateCtrlLabel() {
  const btn = document.getElementById('ds-ctrl-current');
  if (!btn) return;
  if (dsCurrentQIdx >= 0 && ds.questions[dsCurrentQIdx]) {
    btn.textContent = `${dsCurrentQIdx + 1}/${ds.questions.length} 번`;
  } else {
    btn.textContent = '문항 선택';
  }
}

// 화면 전환
function showScreen(name) {
  document.querySelectorAll('.dscreen').forEach(s => s.classList.remove('active'));
  document.getElementById('ds-' + name).classList.add('active');
}

function showError(msg) {
  document.getElementById('ds-error-msg').textContent = msg;
  showScreen('error');
}
</script>
